spring.application.name=hotelia-backend

# Datasource
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/hotelia?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# JWT
app.jwt.secret=${APP_JWT_SECRET:hoteliaSecretKey2024VeryLongSecretKeyForJWTSigning}
app.jwt.expiration=${APP_JWT_EXPIRATION:86400000}

server.port=8080

# Actuator (healthcheck Docker)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never